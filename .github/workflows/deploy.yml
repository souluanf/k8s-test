name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/souluanf/k8s-test

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: mvn package -DskipTests

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest,${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to k3s
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            kubectl apply -f https://raw.githubusercontent.com/souluanf/k8s-test/main/k8s/namespace.yaml
            kubectl apply -f https://raw.githubusercontent.com/souluanf/k8s-test/main/k8s/deployment.yaml
            kubectl apply -f https://raw.githubusercontent.com/souluanf/k8s-test/main/k8s/service.yaml
            kubectl apply -f https://raw.githubusercontent.com/souluanf/k8s-test/main/k8s/ingress.yaml
            kubectl rollout restart deployment/k8s-test -n k8s-test
