apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-test
  namespace: k8s-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-test
  template:
    metadata:
      labels:
        app: k8s-test
    spec:
      containers:
        - name: k8s-test
          image: ghcr.io/souluanf/k8s-test:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: k8s-test-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
